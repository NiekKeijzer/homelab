[tools]
opentofu = '1.9.1'
packer = "1.12.0"
dasel = "2.8.1"
ansible-core = "latest"
fnox = "latest"

[settings]
env_shell_expand = true

[env]
_.path = ["{{ config_root }}/bin"]

# Shared configuration
GENERATED_DIR = "{{ config_root }}/generated"

PROVISION_USER = "mrrobot"

# Packer environment variables
PACKER_LOG = "0"

# OpenTofu / Terraform environment variables
TF_INPUT = 0
TF_LOG = "ERROR"

TF_VAR_generated_files = "{{ env.GENERATED_DIR }}"

# Ansible environment variables
ANSIBLE_REMOTE_USER = "{{ env.PROVISION_USER }}"
ANSIBLE_PRIVATE_KEY_FILE = "{{ env.GENERATED_DIR }}/id_ed25519"

[hooks]
enter = "mise run project:build:bin"
postinstall = "mise run project:dependencies"

[tasks."project:setup"]
depends = ["project:build:bin", "project:dependencies", "keys:generate"]

[tasks."project:build:bin"]
hide = true
silent = true
description = "Builds the bin directory, containing symlinks to the tools"
run = """
  # This is a workaround to ensure to ensure tools that are looking for `terraform` in the PATH
  # actually find the OpenTofu binary. Fingers crossed the API will not change in the future.
  ln -sf $(mise which tofu) ./bin/terraform
"""

[tasks."project:dependencies"]
hide = true
silent = true
description = "Installs project dependencies not managed by Mise"
depends = [
  "packer:init",
  "tofu:init",
  "ansible:install",
]

[tasks."keys:generate"]
description = "Generates necessary keys for the project"
depends = [
  "ssh:generate-key",
  "fnox:age:generate-key",
]

[tasks."ssh:generate-key"]
description = "Generates a new SSH key pair for the project"
depends_post = ["fnox:ssh:sync"]
silent = true
run = """
if [ ! -f {{ env.GENERATED_DIR }}/id_ed25519 ]; then
  ssh-keygen -t ed25519 -f {{ env.GENERATED_DIR }}/id_ed25519 -N "" > /dev/null
fi
"""

[tasks."fnox:age:generate-key"]
description = "Generates a new Age key pair"
run = """
age-keygen -o 
if [ ! -f ~/.config/fnox/age.txt ]; then
  age-keygen -o ~/.config/fnox/age.txt
else
  echo "Age key pair already exists"
fi
"""

[tasks."fnox:ssh:sync"]
description = "Syncs the generated SSH public key with keys already in fnox"
silent = true
run = """
#!/usr/bin/env bash
set -euo pipefail

NEW_KEY=$(cat {{ env.GENERATED_DIR }}/id_ed25519.pub)
EXISTING=${TF_VAR_provision_ssh_public_keys:-"[]"}

if echo "$EXISTING" | jq -e --arg key "$NEW_KEY" 'contains([$key])' > /dev/null; then
  echo "Public key already in TF_VAR_provision_ssh_public_keys"
else
  fnox set TF_VAR_provision_ssh_public_keys "$(echo "$EXISTING" | jq --arg key "$NEW_KEY" '. + [$key]')" --description "Managed by Mise"
  echo "Added public key to TF_VAR_provision_ssh_public_keys"
fi
"""

[tasks."fnox:age:show-public-key"]
description = "Shows the public Age key"
run = "age-keygen -y ~/.config/fnox/age.txt"

[tasks."fnox:age:add-public-key"]
description = "Adds the public Age key to the fnox recipients"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ $# -ne 1 ]; then
  echo "Usage: mise run fnox:age:add-public-key <public-key>"
  exit 1
fi

if [ $(grep -c "$1" fnox.toml) -ne 0 ]; then
  echo "Public key already exists in fnox.toml"
  exit 0
fi

dasel put -t string -f fnox.toml -v "$1" 'providers.age.recipients.[]'
"""

[tasks."packer:init"]
description = "Initializes Packer templates"
run = "find ./packer-templates -type d -mindepth 1 -maxdepth 1 -exec packer init {} \\;"

[tasks."packer:build:all"]
description = "Build all Packer images"
depends = [
  "packer:build:debian13"
]

[tasks."packer:build:debian13"]
description = "Build a Debian image with Packer"
run = "packer build -var-file=packer-templates/debian-13.pkrvars.hcl packer-templates/debian"

# TODO: Ideally -chdir would be set once for all OpenTofu tasks. However, TF_CLI_ARGS can only be used for subcommands
[tasks."tofu:init"]
description = "Initializes a OpenTofu working directory"
run = "tofu -chdir=infra init -upgrade"

[tasks."tofu:plan"]
description = "Generates an execution plan for OpenTofu"
run = "tofu -chdir=infra plan -out tfplan"

[tasks."tofu:apply"]
description = "Applies the changes required to reach the desired state of the configuration"
run = "tofu -chdir=infra apply tfplan"

[tasks."tofu:yolo"]
description = "Applies the changes required to reach the desired state of the configuration without a plan"
run = "tofu -chdir=infra apply -auto-approve"

[tasks."tofu:refresh"]
description = "Updates the state file with the real infrastructure"
run = "tofu -chdir=infra refresh"

[tasks."tofu:destroy"]
description = "Destroy OpenTofu-managed infrastructure"
run = "tofu -chdir=infra destroy"

[tasks."tofu:validate"]
description = "Validates the OpenTofu files"
run = "tofu -chdir=infra validate"

[tasks."tofu:format"]
description = "Formats the OpenTofu files"
run = "tofu -chdir=infra fmt"

[tasks."tofu:check"]
description = "Checks the OpenTofu files"
depends = ["tofu:format", "tofu:validate"]

[tasks."ansible:install"]
description = "Installs Ansible roles and collections"
depends = [
  "ansible:install:collections",
  "ansible:install:roles",
]

[tasks."ansible:install:collections"]
description = "Installs Ansible collections"
run = "ansible-galaxy collection install -r playbooks/requirements.yaml"

[tasks."ansible:install:roles"]
description = "Installs Ansible roles"
run = "ansible-galaxy role install -r playbooks/requirements.yaml"

[tasks."ansible:inventory"]
description = "Lists the Ansible inventory"
run = "ansible-inventory --list"

[tasks."ansible:ping"]
description = "Ping all hosts in the Ansible inventory"
run = "ansible all -m ping"

[tasks."ansible:run:main"]
description = "Provision and configure the homelab using Ansible"
run = "ansible-playbook playbooks/main.yaml"

[tasks."ansible:run:stacks"]
description = "Deploy Docker stacks using Ansible"
run = "ansible-playbook playbooks/main.yaml --tags=stacks"
