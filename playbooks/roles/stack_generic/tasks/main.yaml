---
- name: "{{ stack_name }} | Create stack directory "
  ansible.builtin.file:
    path: "{{ stack_vm_dir }}"
    state: directory
    mode: '0744'

- name: "{{ stack_name }} | Upload stack files"
  debug:
    msg: "Would upload {{ stack_dir }}/{{ item }} to {{ stack_vm_dir }}/{{ item  }}"
  with_items: 
    - "docker-compose.yaml"
    - "scripts"
    - "config"

- name: "{{ stack_name }} | Upload stack files"
  ansible.builtin.copy:
    src: "{{ stack_dir }}/{{ item }}"
    dest: "{{ stack_vm_dir }}/{{ item }}"
    owner: "{{ ansible_user }}"
    group: docker
    mode: '0744'
    recursive: yes
  with_items: 
    - "docker-compose.yaml"
    - "scripts"
    - "config"
  when: 
    - (stack_dir ~ '/' ~ item) is file
    - (stack_dir ~ '/' ~ item) is directory

- name: "{{ stack_name }} | Check if stack defines external dependencies"
  block: 
    - name: "{{ stack_name }} | Read docker-compose.yaml"
      ansible.builtin.slurp:
        src: "{{ stack_dir }}/docker-compose.yaml"
      delegate_to: localhost
      become: false
      register: _compose_raw

    - name: "{{ stack_name }} | Parse docker-compose.yml"
      ansible.builtin.set_fact:
        compose: "{{ _compose_raw.content | b64decode | from_yaml }}"

    - name: "{{ stack_name }} | Create external networks "
      community.docker.docker_network:
        name: "{{ item.key }}"
        driver: "{{ item.value.driver | default('bridge') }}"
        state: present
      loop: "{{ compose.networks | dict2items | selectattr('value.external', 'defined') }}"
      when: 
        - compose.networks is defined

    - name: "{{ stack_name }} | Deploy stack secrets "
      ansible.builtin.include_tasks: deploy_service_secrets.yaml
      vars: 
        secrets: "{{ compose.secrets }}"
        service: "{{ item }}"
        service_name: "{{ item.key }}"
        service_config: "{{ item.value }}"
      loop: "{{ compose.services | dict2items }}"
      when: 
        - compose.secrets is defined

# TODO: Check if stack is already deployed and only redeploy if there are changes
- name: "{{ stack_name }} | Deploy stack using Docker Compose"
  community.docker.docker_compose_v2:
    project_src: "{{ stack_vm_dir }}"
    state: present
    recreate: "always"
    remove_orphans: true

