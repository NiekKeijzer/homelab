networks: 
  infra: 
    external: true

secrets: 
  postgres_password: 
    file: ./secrets/postgres/postgres_password

services: 
  postgres: 
    image: postgres:18.2
    restart: unless-stopped
    security_opt: 
      - no-new-privileges:true
    environment:
      - POSTGRES_USER=mrrobot
      - POSTGRES_PASSWORD_FILE=/run/secrets/postgres_password
    networks:
      - infra
    volumes:
      - ./data/postgres:/var/lib/postgresql
    secrets: 
      - postgres_password
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      timeout: 5s
      test: ["CMD", "pg_isready", "-U", "mrrobot"]

  redis: 
    image: redis:8.4
    restart: unless-stopped
    security_opt: 
      - no-new-privileges:true
    networks:
      - infra 
    volumes: 
      - ./data/redis:/data
    healthcheck:
      interval: 30s
      retries: 5 
      start_period: 20s
      timeout: 5s
      test: ["CMD", "redis-cli", "--raw", "ping"]